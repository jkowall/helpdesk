<!--
  PAESSLER HELPDESK – AI WIDGET (HEADER)
  Paste into: Admin → Portals → Appearance → Pages → Header
  Place this ABOVE the existing {{ header }} tag.

  Credentials are injected locally from .env when rendered to dist/.
-->

{% if portal.has_user_signed_in == true %}
<div id="embrace-widget-container" class="widget-top-bar">
  <div class="bar-label">Get Instant Help</div>
  <div class="ai-disclosure">Powered by AI</div>

  <div class="chat-wrapper">
    <embrace-chat org-id="__EMBRACE_ORG_ID__" client-id="__EMBRACE_CLIENT_ID__" data-fd_email='{{portal.user.email}}'>
      <template>
        <div slot="initial-message"
          style="text-align: center; padding: 0 16px;">
          <div style="display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: nowrap; margin-bottom: 24px;">
            <div style="font-size: 28px; line-height: 118%; font-weight: 600; color: #333;">
              Hi, I'm Max! Your AI support guide.
            </div>
            <div style="display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 999px; border: 2px solid #b8ef49; background: linear-gradient(180deg, #f5ffd8 0%, #ddf7a8 100%); color: #4a7600; font-size: 0.76rem; font-weight: 700; white-space: nowrap; box-shadow: 0 0 0 1px rgba(184, 239, 73, 0.2), 0 0 18px rgba(144, 194, 38, 0.28);">
              <span style="width: 7px; height: 7px; border-radius: 50%; background: #90c226; display: inline-block; box-shadow: 0 0 0 4px rgba(184, 239, 73, 0.18), 0 0 12px rgba(144, 194, 38, 0.7);"></span>
              Online and ready to help
            </div>
          </div>
          <div style="font-size: 20px; line-height: 140%; font-weight: 400; color: #555; max-width: 600px; margin: 0 auto;">
            I can help you with PRTG setup, troubleshooting, and answer your questions instantly. Available 24/7.
          </div>
        </div>
        <div slot="input-placeholder">Ask Max a question...</div>
      </template>
    </embrace-chat>
  </div>

  <div class="widget-controls">
    <a href="{{ portal.new_ticket_url }}" id="btn-open-ticket-widget" class="widget-btn" style="text-decoration: none;">Still need help? Open a Ticket</a>
    <button type="button" id="btn-expand" class="widget-btn primary">Expand Chat</button>
  </div>
</div>
{% endif %}
