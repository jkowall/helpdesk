<!--
  PAESSLER HELPDESK – AI WIDGET SCRIPT (FOOTER)
  Paste into: Admin → Portals → Appearance → Pages → Footer
  Place this BEFORE the {{ footer }} tag.
-->

<script type="module" src="https://js.embrace.ai/v1/elements.js" nonce="{{portal.nonce}}"></script>

<script nonce="{{portal.nonce}}">
  (function () {
    var container = document.getElementById('embrace-widget-container');
    var expandBtn = document.getElementById('btn-expand');
    var heroChatField = document.getElementById('hero-chat-field');
    var heroChatSubmit = document.getElementById('hero-chat-submit');
    var ticketBtnSnippet = document.getElementById('btn-open-ticket-widget');
    var barLabel = document.querySelector('.bar-label');

    if (!container || !expandBtn) return;

    expandBtn.addEventListener('click', function () {
      var isFullscreen = container.classList.toggle('widget-fullscreen');
      if (isFullscreen) {
        expandBtn.textContent = 'Collapse Chat';
        if (ticketBtnSnippet) ticketBtnSnippet.style.display = 'inline-block';
        if (barLabel) barLabel.style.display = 'none';
      } else {
        expandBtn.textContent = 'Expand Chat';
        if (ticketBtnSnippet) ticketBtnSnippet.style.display = 'none';
        if (barLabel) barLabel.style.display = 'flex';
      }
    });

    window.openFullscreenChat = function (message) {
      if (!container.classList.contains('widget-fullscreen')) {
        expandBtn.click();
      }

      if (!message) return;

      setTimeout(function () {
        var chatEl = document.querySelector('embrace-chat');
        if (chatEl && chatEl.shadowRoot) {
          var input = chatEl.shadowRoot.querySelector('textarea, input[type="text"]');
          if (input) {
            var nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value') ||
              Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value');
            if (nativeSetter && nativeSetter.set) {
              nativeSetter.set.call(input, message);
            } else {
              input.value = message;
            }
            input.dispatchEvent(new Event('input', { bubbles: true }));

            var sendBtn = chatEl.shadowRoot.querySelector('button[type="submit"], button[aria-label*="send" i], button[aria-label*="Send"], form button:last-of-type');
            if (sendBtn) {
              setTimeout(function () { sendBtn.click(); }, 150);
            } else {
              input.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true }));
              input.dispatchEvent(new KeyboardEvent('keypress', { key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true }));
              input.dispatchEvent(new KeyboardEvent('keyup', { key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true }));
            }
          }
        }
      }, 600);
    };

    if (heroChatSubmit) {
      heroChatSubmit.addEventListener('click', function () {
        var msg = heroChatField ? heroChatField.value.trim() : '';
        if (msg) {
          openFullscreenChat(msg);
          heroChatField.value = '';
        } else {
          openFullscreenChat();
        }
      });
    }

    if (heroChatField) {
      heroChatField.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (heroChatSubmit) heroChatSubmit.click();
        }
      });
    }

    var pills = document.querySelectorAll('.topic-pill');
    for (var i = 0; i < pills.length; i++) {
      pills[i].addEventListener('click', function () {
        var topic = this.getAttribute('data-topic');
        openFullscreenChat(topic);
      });
    }

    function injectShadowStyles() {
      var chatEl = document.querySelector('embrace-chat');
      if (!chatEl) return;

      function tryInject() {
        var sr = chatEl.shadowRoot;
        if (!sr) return false;
        if (sr.querySelector('#paessler-shadow-overrides')) return true;

        var style = document.createElement('style');
        style.id = 'paessler-shadow-overrides';
        style.textContent =
          '[part="initial-header"] { display: none !important; }' +
          '[part="chat"] { border: none !important; box-shadow: none !important; border-radius: 0 !important; }';
        sr.appendChild(style);
        return true;
      }

      if (!tryInject()) {
        var observer = new MutationObserver(function () {
          if (tryInject()) observer.disconnect();
        });
        observer.observe(chatEl, { childList: true, subtree: true });
        setTimeout(tryInject, 500);
        setTimeout(tryInject, 1500);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', injectShadowStyles);
    } else {
      injectShadowStyles();
    }
  })();
</script>
