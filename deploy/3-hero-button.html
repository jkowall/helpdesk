<!--
  PAESSLER HELPDESK – HERO CHAT BLOCK
  Paste into: Admin → Portals → Appearance → Pages → Home
  Place this inside the logged-in hero area on portal_home.
-->

<div class="hero-chat-input">
  <input type="text" id="hero-chat-field" placeholder="Describe your issue here..." autocomplete="off">
  <button type="button" id="hero-chat-submit" title="Send">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M5 12h14M12 5l7 7-7 7" />
    </svg>
  </button>
</div>

<div class="suggested-topics">
  <button type="button" class="topic-pill" data-topic="{{ai_pill_email_notification}}">{{ai_pill_email_notification}}</button>
  <button type="button" class="topic-pill" data-topic="{{ai_pill_unknown_status}}">{{ai_pill_unknown_status}}</button>
  <button type="button" class="topic-pill" data-topic="{{ai_pill_setup_snmp_sensors}}">{{ai_pill_setup_snmp_sensors}}</button>
</div>

<div class="hero-secondary-link">
  Need more help? <a href="{{ portal.new_ticket_url }}">Create ticket.</a>
</div>
