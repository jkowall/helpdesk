<!--
  PAESSLER HELPDESK – HERO CHAT BLOCK
  Paste into: Admin → Portals → Appearance → Pages → Home
  Place this inside the logged-in hero area on portal_home.
-->

<div class="hero-chat-input">
  <input type="text" id="hero-chat-field" placeholder="Ask Max a question..." autocomplete="off">
  <button type="button" id="hero-chat-submit" title="Send">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M5 12h14M12 5l7 7-7 7" />
    </svg>
  </button>
</div>

<div class="suggested-topics">
  <button type="button" class="topic-pill" data-topic="{{ai_pill_install_prtg}}">{{ai_pill_install_prtg}}</button>
  <button type="button" class="topic-pill" data-topic="{{ai_pill_install_requirements}}">{{ai_pill_install_requirements}}</button>
  <button type="button" class="topic-pill" data-topic="{{ai_pill_setup_snmp_sensors}}">{{ai_pill_setup_snmp_sensors}}</button>
  <button type="button" class="topic-pill" data-topic="{{ai_pill_email_notification}}">{{ai_pill_email_notification}}</button>
  <button type="button" class="topic-pill" data-topic="{{ai_pill_setup_probe}}">{{ai_pill_setup_probe}}</button>
  <button type="button" class="topic-pill" data-topic="{{ai_pill_probe_not_connecting}}">{{ai_pill_probe_not_connecting}}</button>
  <button type="button" class="topic-pill" data-topic="{{ai_pill_sensor_unknown}}">{{ai_pill_sensor_unknown}}</button>
  <button type="button" class="topic-pill" data-topic="{{ai_pill_sensor_errors}}">{{ai_pill_sensor_errors}}</button>
</div>

<div class="hero-secondary-link">
  Still need help? You can also <a href="{{ portal.new_ticket_url }}">create a ticket</a>.
</div>
